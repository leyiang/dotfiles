[manager]
ratio=[2, 6, 0]
linemode="size"
sort_by="btime"
sort_reverse=true

[opener]

mpv = [
    { run = 'mpv "$@"', orphan = true, for = "unix" },
]

vlc = [
    { run = 'vlc "$@"', orphan = true, for = "unix" },
]

edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]

pdf = [
    { run = 'zathura "$@"' , orphan=true , desc = "Open" }  ,
    { run = 'file "$@"'    , block=true  , desc = " file" } ,
]

epub = [
    { run = 'ebook-viewer "$@"', desc = "Open epub" },
]

extract = [
    { run = 'ouch d -y "$@"', desc = "Extract here with ouch", for = "unix" },
]

py = [
    { run = 'nvim "$@"', block = true, for = "unix" },
    { run = 'python "$@"', desc = "run", for = "unix" },
]

audio = [
    { run = 'vlc "$@"', for = "unix" },
    # { run = 'mpv "$@"', for = "unix" },
]

chrome = [
    { run = 'google-chrome "$@"', for = "unix" },
]

[open]
prepend_rules = [
    # Multiple openers for a single rule
    { name = "*.html", use = [ "edit" ] },
    { name = "*.pdf", use = "pdf" },
    { name = "*.epub", use = "epub" },
    { name = "*.py", use = "py" },
    { name = "*.srt", use = "edit" },
    { mime = "text/*", use = "edit" },

    { name = "*.webm", use = "vlc" },
    { name = "*.flac", use = "audio" },
    { mime = "video/*", use = "mpv" },

    { mime = "audio/*", use = "audio" },
    { name = "*.m4a", use = "audio" },

    { mime = "application/postscript", use = "edit" },
]

[plugin]
prepend_preloaders = [
	{ mime = "*", run = "noop" },
]

prepend_previewers = [
    { mime = "audio/*" , run = "noop" },
    { mime = "video/*" , run = "noop" },
    # { name = "*" , run = "noop" },
]
