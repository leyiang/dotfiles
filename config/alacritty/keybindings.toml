# ctrl+insert && shift+insert 复制和粘贴
[[keyboard.bindings]]
action = "Copy"
key = "Insert"
mods = "Control"

[[keyboard.bindings]]
action = "Paste"
key = "Insert"
mods = "Shift"

# ctrl+enter 打开新终端
[[keyboard.bindings]]
key = "Return"
mods = "Alt"
command = { program = "smartterminal", args = ["--ssh"] }

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u000A"


[[keyboard.bindings]]
key = "Back"
chars = "\u007f"
